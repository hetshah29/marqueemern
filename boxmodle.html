<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 20px;">

    <h1 style="background-color: salmon; padding: 25px; border: 4px solid black; margin-bottom: 20px;">
        Box Model
    </h1>

    <p style="background-color: lightblue; padding: 15px; border: 5px solid navy; margin-bottom: 15px;">
        Every element on the page has its own box, which can be styled using CSS.
    </p>

    <p style="background-color: lightblue; padding: 15px; border: 5px solid navy; margin-bottom: 15px;">
        From the inside out:
    </p>

    <ul style="margin-left: 30px;">
        <li style="background-color: yellow; color: purple;">Content</li>
        <li style="background-color: yellow; color: purple;">Padding</li>
        <li style="background-color: yellow; color: purple;">Border</li>
        <li style="background-color: yellow; color: purple;">Margin</li>
    </ul>

    <h2 style="margin-top: 25px;">Background</h2>

    <p style="background-color: lightblue; padding: 15px; border: 5px solid navy;">
        Keep in mind that a
        <span style="background-color: white; border: 3px solid black; padding: 10px;">
            background
        </span>
        will cover the content and the padding.
    </p>

</body>
</html>

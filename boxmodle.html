<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Box Model</h1>

    <p class="box">
        Every element on the page has its own box, which can be styled using CSS.
    </p>

    <p class="box">
 
        From the inside out:
    </p>

    <ul>

        <li>content</li>
        <li>padding</li>
        <li>border<
            /li>
        <li>margin</li>
    </ul>

    <h2>Background</h2>

    <p class="box">
        Keep in mind that a
        <span class="background">background</span>
        will cover the content and the padding.
    </p>

</body>
</html>
